[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "generator"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["clients", "team", "home-training", "skills", "docs"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line length handled by formatter where possible
    "B008",  # allow function calls in argument defaults (FastAPI, pydantic)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
files = ["app"]
