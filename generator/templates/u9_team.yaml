name: "U9 Team Session (La Masia)"
context: "team"
total_duration_minutes: [75, 90]

phases:
  - name: "Warm-up with Ball"
    duration_minutes: [8, 12]
    required_categories:
      - warmup
    require_equipment: [ball]
    min_exercises: 2
    max_exercises: 3
    notes: >
      Every player has a ball from the first second — no laps, no static
      stretching. Use game-based warm-ups: tag while dribbling, dribble
      races through gates, partner passing on the move.
      La Masia principle: the ball is the best teacher.
      Build from playful to focused. Head always up.

  - name: "Rondo"
    duration_minutes: [10, 15]
    required_categories:
      - rondo
    min_exercises: 1
    max_exercises: 2
    notes: >
      The heart of every La Masia session. Non-negotiable.
      Start with simpler rondo (3v1 or 4v1), progress to 4v2 or 5v2.
      Split into multiple rondo groups if needed (e.g. two 4v1 grids).
      Coach body shape, check shoulders, play to back foot.
      Let players solve — minimal verbal instruction.
      "Rondo is where we learn everything" — Xavi.

  - name: "Positional Play"
    duration_minutes: [12, 18]
    required_categories:
      - positional_play
    min_exercises: 1
    max_exercises: 2
    notes: >
      Juego de posición — positional games with numerical overloads.
      This is where La Masia players learn to read the game.
      Possession Square, build-up from GK, third-man combinations,
      playing between the lines, free man recognition.
      Always game-realistic with opposition. Both feet.
      Key: the game teaches the lesson, not the coach's voice.

  - name: "Game Form"
    duration_minutes: [15, 22]
    required_categories:
      - small_sided_games
    min_exercises: 1
    max_exercises: 2
    notes: >
      Small-sided game (ideally 4v4+GK or Funino 3v3 four-goal)
      with specific constraints that reinforce the session theme.
      Constraints-led: manipulate rules/space/numbers, not players.
      Coach observes, intervenes minimally. Freeze-frame only
      for clear teaching moments. Let the game be the teacher.

  - name: "Free Game"
    duration_minutes: [12, 18]
    required_categories:
      - small_sided_games
    min_exercises: 1
    max_exercises: 1
    notes: >
      Unrestricted small-sided game. Let them play.
      This is where implicit learning happens — players transfer
      what they practiced into free decision-making.
      Coach stays quiet. Only manage safety and fairness.
      La Masia principle: the game is the ultimate teacher.

  - name: "Cool Down & Reflection"
    duration_minutes: [3, 5]
    required_categories:
      - cool_down
    min_exercises: 1
    max_exercises: 2
    notes: >
      Light activity, stretching, group reflection.
      Ask the players: What did you learn? What was fun?
      Positive reinforcement. Celebrate effort, not just outcomes.
