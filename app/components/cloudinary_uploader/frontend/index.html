<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Streamlit component bridge -->
  <script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
  <!-- Cloudinary Upload Widget -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 4px 0 8px;
      background: transparent;
    }
    #upload-btn {
      background: #3B82F6;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    #upload-btn:hover { background: #2563EB; }
    #status {
      margin-top: 6px;
      font-size: 12px;
      color: #9CA3AF;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <button id="upload-btn">📁 Vælg og upload stor fil (op til 2 GB)</button>
  <div id="status"></div>

  <script>
    var myWidget = null;

    function initWidget(args) {
      if (myWidget) {
        try { myWidget.destroy(); } catch (e) {}
        myWidget = null;
      }

      myWidget = cloudinary.createUploadWidget(
        {
          cloudName: args.cloud_name,
          apiKey: args.api_key,
          uploadSignature: args.signature,
          uploadSignatureTimestamp: args.timestamp,
          folder: args.folder,
          resourceType: "auto",
          sources: ["local"],
          multiple: false,
          maxFileSize: 2000000000,
          showCompletedButton: true,
          clientAllowedFormats: [
            "mp4", "mov", "avi", "mkv", "m4v", "webm",
            "jpg", "jpeg", "png", "webp", "gif", "heic", "heif"
          ],
          styles: {
            palette: {
              window: "#1F2937",
              windowBorder: "#374151",
              tabIcon: "#3B82F6",
              menuIcons: "#9CA3AF",
              textDark: "#F9FAFB",
              textLight: "#6B7280",
              link: "#3B82F6",
              action: "#3B82F6",
              inactiveTabIcon: "#9CA3AF",
              error: "#EF4444",
              inProgress: "#3B82F6",
              complete: "#10B981",
              sourceBg: "#111827"
            }
          }
        },
        function (error, result) {
          if (error) {
            var msg = error.statusText || error.message || JSON.stringify(error);
            document.getElementById("status").textContent = "✗ Fejl: " + msg;
            return;
          }
          if (result && result.event === "success") {
            document.getElementById("status").textContent =
              "✓ Uploadet: " + result.info.original_filename;
            Streamlit.setComponentValue(result.info.secure_url);
          }
        }
      );

      document.getElementById("upload-btn").onclick = function () {
        myWidget.open();
      };

      Streamlit.setFrameHeight(document.body.scrollHeight + 8);
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function (event) {
      initWidget(event.detail.args);
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(52);
  </script>
</body>
</html>
