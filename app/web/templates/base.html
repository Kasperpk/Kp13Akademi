<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}KP13 Akademi{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kp: {
                            bg: '#0F1116',
                            card: '#1A1D27',
                            border: '#2A2D3A',
                            text: '#E5E7EB',
                            muted: '#9CA3AF',
                            accent: '#3B82F6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-kp-bg text-kp-text min-h-screen font-sans">
    <main class="pb-24 px-4 pt-6 max-w-lg mx-auto">
        {% block content %}{% endblock %}
    </main>

    {% if token is defined and token %}
    <nav class="fixed bottom-0 left-0 right-0 bg-kp-card border-t border-kp-border safe-bottom z-50">
        <div class="flex justify-around max-w-lg mx-auto py-3">
            <a href="/p/{{ token }}" class="flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 {{ 'text-kp-accent' if active == 'home' else 'text-kp-muted' }}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <span class="text-[10px] {{ 'text-kp-accent font-medium' if active == 'home' else 'text-kp-muted' }}">Training</span>
            </a>
            <a href="/p/{{ token }}/development" class="flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 {{ 'text-kp-accent' if active == 'development' else 'text-kp-muted' }}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
                <span class="text-[10px] {{ 'text-kp-accent font-medium' if active == 'development' else 'text-kp-muted' }}">Development</span>
            </a>
        </div>
    </nav>
    {% endif %}
</body>
</html>
